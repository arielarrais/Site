<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividendos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="with-sidebar">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-toggle">
      <span class="sidebar-brand sidebar-expanded">Investimentos</span>
      <span class="toggle-icon sidebar-expanded">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </span>
      <span class="toggle-icon sidebar-collapsed-only">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="sidebar-link" data-page="dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Dashboard</span>
      </a>
      <a href="/lancamentos" class="sidebar-link" data-page="lancamentos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Lançamentos</span>
      </a>
      <a href="/dividendos" class="sidebar-link" data-page="dividendos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Dividendos</span>
      </a>
      <a href="/ativos" class="sidebar-link" data-page="ativos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Ativos</span>
      </a>
      <a href="/usuarios" class="sidebar-link admin-only hidden" data-page="usuarios">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Usuarios</span>
      </a>
      <a href="/configuracoes" class="sidebar-link" data-page="configuracoes">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Configuracoes</span>
      </a>
    </nav>
  </aside>
  <nav class="top-nav">
    <div class="top-nav-brand">Dividendos</div>
    <div class="top-nav-actions">
      <button id="logout-button" class="btn btn-danger">Sair</button>
    </div>
  </nav>

  <div class="container dashboard-active" id="main-container">
    <div class="card dashboard-card">
      <div class="dashboard-content">
        <div class="portfolio-panel">
          <div class="info-box">
            <div class="portfolio-header">
              <h2>Dividendos Recebidos</h2>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
              <input type="text" id="dividendos-filter" placeholder="Filtrar por ticker..." style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;flex:1;max-width:300px" />
              <span id="dividendos-count" class="small-note"></span>
            </div>
            <div style="max-height:calc(100vh - 260px);overflow:auto">
              <table class="admin-table" style="width:100%;font-size:13px">
                <thead><tr>
                  <th style="cursor:pointer" data-col="ticker">Ticker</th>
                  <th style="cursor:pointer" data-col="month">Mês</th>
                  <th>Total recebido (R$)</th>
                  <th>Qtd</th>
                </tr></thead>
                <tbody id="dividendos-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="dividendos.js"></script>
</body>
</html>
