<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container" id="main-container">
    <div class="card" id="login-card">
      <h1>Entrar</h1>
      <p class="subtitle">Acesse sua conta</p>
      <form id="login-form">
        <div class="input-group">
          <label for="login-username">Email</label>
          <input type="text" id="login-username" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="Digite sua senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <p class="error" id="login-error"></p>
      </form>
      <p class="toggle-text">Não tem uma conta? <a href="#" id="show-register">Cadastre-se</a></p>
    </div>

    <div class="card hidden" id="register-card">
      <h1>Cadastro</h1>
      <p class="subtitle">Crie sua conta</p>
      <form id="register-form">
        <div class="input-group">
          <label for="register-name">Nome</label>
          <input type="text" id="register-name" placeholder="Seu nome completo" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="register-username">Email</label>
          <input type="email" id="register-username" placeholder="seu@email.com" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" placeholder="Mínimo 4 caracteres" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Criar conta</button>
        <p class="error" id="register-error"></p>
      </form>
      <p class="toggle-text">Já tem uma conta? <a href="#" id="show-login">Entrar</a></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
