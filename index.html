<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="with-sidebar">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-toggle">
      <span class="sidebar-brand sidebar-expanded">Investimentos</span>
      <span class="toggle-icon sidebar-expanded">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </span>
      <span class="toggle-icon sidebar-collapsed-only">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="sidebar-link" data-page="dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Dashboard</span>
      </a>
      <a href="/lancamentos" class="sidebar-link" data-page="lancamentos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Lançamentos</span>
      </a>
      <a href="/ativos" class="sidebar-link" data-page="ativos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Ativos</span>
      </a>
      <a href="/usuarios" class="sidebar-link admin-only hidden" data-page="usuarios">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Usuarios</span>
      </a>
      <a href="/configuracoes" class="sidebar-link" data-page="configuracoes">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Configuracoes</span>
      </a>
    </nav>
  </aside>
  <nav class="top-nav">
    <div class="top-nav-brand"><span id="display-user"></span></div>
    <div class="top-nav-actions">
      <button id="logout-button" class="btn btn-danger">Sair</button>
    </div>
  </nav>
  <div class="container dashboard-active" id="main-container">
    <div class="card dashboard-card" id="dashboard-card">
      <div class="dashboard-content">
        <div id="portfolio-panel" class="portfolio-panel">
          <div class="metrics-row" id="metrics-row">
            <div class="metric-card">
              <span class="metric-label">Investido</span>
              <span class="metric-value" id="metric-invested">R$ 0,00</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Valor total</span>
              <span class="metric-value" id="metric-total-value">R$ 0,00</span>
              <span class="metric-sub" id="metric-variation-sub"></span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Dividendos</span>
              <span class="metric-value profit" id="metric-dividends-sum">R$ 0,00</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Valor total + Dividendos</span>
              <span class="metric-value" id="metric-cost-dividends">R$ 0,00 <span class="metric-pct" id="metric-cost-dividends-pct"></span></span>
              <span class="metric-sub" id="metric-cost-dividends-sub"></span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Rentabilidade</span>
              <span class="metric-value" id="metric-rentabilidade">R$ 0,00</span>
              <span class="metric-sub" id="metric-rentabilidade-pct"></span>
            </div>
          </div>
          <div class="info-box">
            <div class="portfolio-header">
              <h2>Buscar ativo</h2>
            </div>
            <form id="asset-search-form" class="asset-search-form">
              <div class="input-group">
                <label for="asset-query">Buscar ativo B3 / FII ou qualquer ticker</label>
                <input id="asset-query" type="text" placeholder="Ex: PETR4, VGHF11 ou MGLU3" autocomplete="off" />
              </div>
              <button type="submit" class="btn btn-primary">Procurar ativo</button>
            </form>
            <div id="search-result" class="search-result hidden"></div>
          </div>

          <div class="info-box">
            <div class="portfolio-list-card">
              <div class="portfolio-section-header">
                <h2>Ações <span id="stock-count" class="asset-count"></span></h2>
                <button class="toggle-section-btn" data-section="stocks" aria-expanded="true">−</button>
              </div>
              <p id="stocks-summary" class="small-note"></p>
              <div id="stocks-list" class="portfolio-list"></div>
            </div>
          </div>
          <div class="info-box">
            <div class="portfolio-list-card">
              <div class="portfolio-section-header">
                <h2>Fundos imobiliários <span id="fii-count" class="asset-count"></span></h2>
                <button class="toggle-section-btn" data-section="fiis" aria-expanded="true">−</button>
              </div>
              <p id="fiis-summary" class="small-note"></p>
              <div id="fiis-list" class="portfolio-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-overlay hidden" id="dividend-modal">
    <div class="modal modal-wide">
      <h2>Dividendos - <span id="dividend-modal-ticker"></span></h2>
      <canvas id="dividend-chart" style="max-height:260px;margin-bottom:16px"></canvas>
      <div id="dividend-list" class="dividend-list"></div>
      <div class="modal-actions">
        <button type="button" id="dividend-modal-close" class="btn btn-secondary" style="width:auto">Fechar</button>
      </div>
    </div>
  </div>





  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
