<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ativos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="with-sidebar">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-toggle">
      <span class="sidebar-brand sidebar-expanded">Investimentos</span>
      <span class="toggle-icon sidebar-expanded">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </span>
      <span class="toggle-icon sidebar-collapsed-only">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="sidebar-link" data-page="dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Dashboard</span>
      </a>
      <a href="/lancamentos" class="sidebar-link" data-page="lancamentos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </span>
        <span class="sidebar-expanded">Lançamentos</span>
      </a>
      <a href="/dividendos" class="sidebar-link" data-page="dividendos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        <span class="sidebar-expanded">Dividendos</span>
      </a>
      <a href="/ativos" class="sidebar-link" data-page="ativos">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Ativos</span>
      </a>
      <a href="/usuarios" class="sidebar-link admin-only hidden" data-page="usuarios">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Usuarios</span>
      </a>
      <a href="/configuracoes" class="sidebar-link" data-page="configuracoes">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="sidebar-expanded">Configuracoes</span>
      </a>
    </nav>
  </aside>
  <nav class="top-nav">
    <div class="top-nav-brand">Ativos</div>
    <div class="top-nav-actions">
      <button id="logout-button-admin" class="btn btn-danger">Sair</button>
    </div>
  </nav>

  <div class="container dashboard-active" id="main-container">
    <div class="card dashboard-card">
      <div class="dashboard-header">
        <h1>Gerenciar Dividendos</h1>
      </div>
      <div class="dashboard-content">
        <div class="asset-search-form" style="margin-bottom:16px">
          <div class="input-group">
            <label for="dividend-search">Buscar ativo</label>
            <input id="dividend-search" type="text" placeholder="Digite o ticker ou nome do ativo" autocomplete="off" />
          </div>
          <button id="dividend-search-btn" class="btn btn-primary">Pesquisar</button>
        </div>
        <div id="acoes-section" class="info-box" style="margin-bottom:24px">
          <div class="section-header">
            <h2>Ações</h2>
            <button class="toggle-section-btn" data-target="acoes" aria-expanded="true">−</button>
          </div>
          <div class="section-body" id="acoes-body">
            <div class="admin-table-wrap">
              <table class="admin-table sortable" id="acoes-table">
                <thead>
                  <tr>
                    <th data-sort="ticker">Ticker <span class="sort-arrows"></span></th>
                    <th data-sort="name">Nome <span class="sort-arrows"></span></th>
                    <th data-sort="lastcomdate">Data Com <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividenddate">Data pgto <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividendvalue">Valor do pgto <span class="sort-arrows"></span></th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="acoes-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="fiis-section" class="info-box">
          <div class="section-header">
            <h2>FIIs</h2>
            <button class="toggle-section-btn" data-target="fiis" aria-expanded="true">−</button>
          </div>
          <div class="section-body" id="fiis-body">
            <div class="admin-table-wrap">
              <table class="admin-table sortable" id="fiis-table">
                <thead>
                  <tr>
                    <th data-sort="ticker">Ticker <span class="sort-arrows"></span></th>
                    <th data-sort="name">Nome <span class="sort-arrows"></span></th>
                    <th data-sort="fiitype">Tipo FII <span class="sort-arrows"></span></th>
                    <th data-sort="lastcomdate">Data COM <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividenddate">Data pgto <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividendvalue">Valor do pgto <span class="sort-arrows"></span></th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="fiis-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="dividend-modal">
    <div class="modal">
      <h2>Cadastrar dividendo</h2>
      <p id="modal-asset-info" class="small-note"></p>
      <form id="dividend-form">
        <div class="input-group">
          <label for="div-com-date">Data COM</label>
          <input id="div-com-date" type="date" required />
        </div>
        <div class="input-group">
          <label for="div-payment-date">Data pgto</label>
          <input id="div-payment-date" type="date" required />
        </div>
        <div class="input-group">
          <label for="div-gross-amount">Dividendo (R$)</label>
          <input id="div-gross-amount" type="number" step="0.01" min="0.01" required />
        </div>
        <div class="input-group">
          <label for="div-type">Tipo</label>
          <select id="div-type" required>
            <option value="dividendo">Dividendo</option>
            <option value="amortizacao">Amortização</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" style="width:auto">Salvar</button>
          <button type="button" id="modal-cancel" class="btn btn-secondary" style="width:auto">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="history-modal">
    <div class="modal modal-wide">
      <h2>Histórico de Dividendos - <span id="history-modal-ticker"></span></h2>
      <canvas id="dividend-chart" style="max-height:260px;margin-bottom:16px"></canvas>
      <div id="history-dividend-list" class="dividend-list"></div>
      <div class="modal-actions">
        <button type="button" id="history-modal-close" class="btn btn-secondary" style="width:auto">Fechar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
