<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ativos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav-brand">Ativos</div>
    <div class="top-nav-actions">
      <button id="sync-dividends-button" class="btn btn-secondary">Sync Dividendos</button>
      <button id="sync-all-button" class="btn btn-secondary">Sync Brapi</button>
      <button id="dashboard-button" class="btn btn-secondary">Dashboard</button>
      <button id="logout-button-admin" class="btn btn-danger">Sair</button>
    </div>
  </nav>

  <div class="container dashboard-active" id="main-container">
    <div class="card dashboard-card">
      <div class="dashboard-header">
        <h1>Gerenciar Dividendos</h1>
      </div>
      <div class="dashboard-content">
        <div id="acoes-section" class="info-box">
          <div class="section-header">
            <h2>Ações</h2>
            <button class="toggle-section-btn" data-target="acoes" aria-expanded="true">−</button>
          </div>
          <div class="section-body" id="acoes-body">
            <div class="admin-table-wrap">
              <table class="admin-table sortable" id="acoes-table">
                <thead>
                  <tr>
                    <th data-sort="ticker">Ticker <span class="sort-arrows"></span></th>
                    <th data-sort="name">Nome <span class="sort-arrows"></span></th>
                    <th data-sort="lastcomdate">Data Com <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividenddate">Data pgto <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividendvalue">Valor do pgto <span class="sort-arrows"></span></th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="acoes-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="fiis-section" class="info-box">
          <div class="section-header">
            <h2>FIIs</h2>
            <button class="toggle-section-btn" data-target="fiis" aria-expanded="true">−</button>
          </div>
          <div class="section-body" id="fiis-body">
            <div class="admin-table-wrap">
              <table class="admin-table sortable" id="fiis-table">
                <thead>
                  <tr>
                    <th data-sort="ticker">Ticker <span class="sort-arrows"></span></th>
                    <th data-sort="name">Nome <span class="sort-arrows"></span></th>
                    <th data-sort="fiitype">Tipo FII <span class="sort-arrows"></span></th>
                    <th data-sort="lastcomdate">Data COM <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividenddate">Data pgto <span class="sort-arrows"></span></th>
                    <th data-sort="lastdividendvalue">Valor do pgto <span class="sort-arrows"></span></th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="fiis-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="dividend-modal">
    <div class="modal">
      <h2>Cadastrar dividendo</h2>
      <p id="modal-asset-info" class="small-note"></p>
      <form id="dividend-form">
        <div class="input-group">
          <label for="div-com-date">Data COM</label>
          <input id="div-com-date" type="date" required />
        </div>
        <div class="input-group">
          <label for="div-payment-date">Data pgto</label>
          <input id="div-payment-date" type="date" required />
        </div>
        <div class="input-group">
          <label for="div-gross-amount">Dividendo (R$)</label>
          <input id="div-gross-amount" type="number" step="0.01" min="0.01" required />
        </div>
        <div class="input-group">
          <label for="div-type">Tipo</label>
          <select id="div-type" required>
            <option value="dividendo">Dividendo</option>
            <option value="amortizacao">Amortização</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" style="width:auto">Salvar</button>
          <button type="button" id="modal-cancel" class="btn btn-secondary" style="width:auto">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="history-modal">
    <div class="modal modal-wide">
      <h2>Histórico de Dividendos - <span id="history-modal-ticker"></span></h2>
      <canvas id="dividend-chart" style="max-height:260px;margin-bottom:16px"></canvas>
      <div id="history-dividend-list" class="dividend-list"></div>
      <div class="modal-actions">
        <button type="button" id="history-modal-close" class="btn btn-secondary" style="width:auto">Fechar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
